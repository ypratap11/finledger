# Full-stack compose: Postgres + Python UI + Node ingest-edge.
# Run with:  docker compose -f docker-compose.full.yml up --build
# Then open: http://localhost:8003

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: finledger
      POSTGRES_PASSWORD: finledger
      POSTGRES_DB: finledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finledger"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata-full:/var/lib/postgresql/data

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://finledger:finledger@postgres:5432/finledger
      TEST_DATABASE_URL: postgresql+asyncpg://finledger:finledger@postgres:5432/finledger
    ports:
      - "8003:8000"
    command: >
      sh -c "alembic upgrade head &&
             python seed_demo.py || true &&
             python seed_revrec_demo.py || true &&
             uvicorn finledger.ui.app:app --host 0.0.0.0 --port 8000"

  ingest-edge:
    build:
      context: ./ingest-edge
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      core:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://finledger:finledger@postgres:5432/finledger
      STRIPE_WEBHOOK_SECRET: whsec_test
      ZUORA_WEBHOOK_SECRET: zuora_test
      INGEST_PORT: 3001
    ports:
      - "3001:3001"

volumes:
  pgdata-full:
