name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finledger
          POSTGRES_PASSWORD: finledger
          POSTGRES_DB: finledger
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 2s --health-timeout 2s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://finledger:finledger@localhost:5432/finledger
      TEST_DATABASE_URL: postgresql+asyncpg://finledger:finledger@localhost:5432/finledger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install
        working-directory: core
        run: pip install -e '.[dev]'
      - name: Migrate
        working-directory: core
        run: alembic upgrade head
      - name: Lint
        working-directory: core
        run: ruff check src tests
      - name: Unit tests
        working-directory: core
        run: pytest tests/unit -v
      - name: Integration tests
        working-directory: core
        run: pytest tests/integration -v
      - name: Property tests
        working-directory: core
        run: pytest tests/property -v

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - working-directory: ingest-edge
        run: npm ci
      - working-directory: ingest-edge
        run: npx tsc --noEmit
      - working-directory: ingest-edge
        run: npm test
