services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: finledger
      POSTGRES_PASSWORD: finledger
      POSTGRES_DB: finledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finledger"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
